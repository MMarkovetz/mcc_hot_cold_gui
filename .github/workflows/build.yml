name: Build executables

# Run on every push and pull request, and let you trigger manually from the
# Actions tab.
on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    name: Build Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Build .exe
        run: pyinstaller --clean --noconfirm MCC_Hot_Cold_GUI.spec
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MCC_Hot_Cold_GUI-windows
          path: dist/MCC_Hot_Cold_GUI.exe
          retention-days: 30

  macos-arm64:
    name: Build macOS .app (Apple Silicon)
    runs-on: macos-14   # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Build .app
        run: pyinstaller --clean --noconfirm MCC_Hot_Cold_GUI_mac.spec
      - name: Zip .app for transport
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent MCC_Hot_Cold_GUI.app MCC_Hot_Cold_GUI-arm64.app.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MCC_Hot_Cold_GUI-macos-arm64
          path: dist/MCC_Hot_Cold_GUI-arm64.app.zip
          retention-days: 30

  macos-x86_64:
    name: Build macOS .app (Intel)
    runs-on: macos-13   # Intel x86_64 runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Build .app
        run: pyinstaller --clean --noconfirm MCC_Hot_Cold_GUI_mac.spec
      - name: Zip .app for transport
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent MCC_Hot_Cold_GUI.app MCC_Hot_Cold_GUI-x86_64.app.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MCC_Hot_Cold_GUI-macos-x86_64
          path: dist/MCC_Hot_Cold_GUI-x86_64.app.zip
          retention-days: 30
